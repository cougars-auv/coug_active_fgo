services:
  demo:
    build:
      context: ..
      dockerfile: demo/Dockerfile.demo
    image: snelsondurrant/cougars:demo
    container_name: demo-ct
    environment:
      - DISPLAY=${DISPLAY}
      - LIBGL_ALWAYS_SOFTWARE=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./demo_ros2_bag:/demo_ros2_bag:ro
    command: >
      ros2 launch coug_active_fgo demo.launch.py
      bag_path:=/demo_ros2_bag
      auv_ns:=blue0sim
